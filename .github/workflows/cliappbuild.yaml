name: Build CLI Executables

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output_basename: cli-tool-release-linux-v2.1
            artifact_path: dist/cli-tool-release-linux-v2.1
          - os: windows-latest
            output_basename: cli-tool-release-win-v2.1
            artifact_path: dist/cli-tool-release-win-v2.1.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --name "${{ matrix.output_basename }}" cli.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_basename }}
          path: ${{ matrix.artifact_path }}